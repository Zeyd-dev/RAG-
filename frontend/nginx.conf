# Serves the built React app and reverse-proxies /api to the backend
# container by its Docker Compose service name ("backend"). This replaces
# the job Vite's dev-server proxy does locally (see vite.config.js) --
# that proxy only exists while `vite` itself is running, so the production
# build (static files served by nginx) needs its own equivalent or every
# fetch("/api/...") in the frontend would 404 with nothing there to answer.
# Same-origin also means no CORS configuration is needed for this path.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any non-API, non-file route (e.g. a notebook deep link)
    # should still serve index.html so React Router can handle it client-side.
    location / {
        try_files $uri /index.html;
    }
}
